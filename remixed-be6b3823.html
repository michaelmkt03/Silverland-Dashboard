<!DOCTYPE html>
<html lang="vi" data-theme="benthanh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silverland — Báo cáo chiến lược Web Direct 2H/2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --mono:'IBM Plex Mono',monospace;
    --disp:'Fraunces',serif;
    /* default = benthanh light theme */
    --bg:#FAF6EF; --bg2:#FFFFFF; --panel:#FBF7F0; --panel2:#F4ECE0;
    --line:#E8DDCC; --line2:#D9C9B2;
    --ink:#2E1F1A; --muted:#7a6a5f; --muted2:#a3917f;
    --teal:#B0512D; --teal-bg:rgba(176,81,45,.10);
    --teal-soft:#c2410c;
    --amber:#C9A227; --amber-bg:rgba(201,162,39,.12);
    --rust:#B0512D; --rust-bg:rgba(176,81,45,.10);
    --blue:#7a6a5f; --blue-bg:rgba(122,106,95,.10);
    --hl:#B0512D;
    --topbar-bg:rgba(250,246,239,.92);
    --tip-bg:#2E1F1A; --tip-ink:#FAF6EF;
    --logo-filter:none;
  }
  html[data-theme="benthanh"]{
    --bg:#FAF6EF; --bg2:#FFFFFF; --panel:#FBF7F0; --panel2:#F4ECE0;
    --line:#E8DDCC; --line2:#D9C9B2;
    --ink:#2E1F1A; --muted:#7a6a5f; --muted2:#a3917f;
    --teal:#B0512D; --teal-bg:rgba(176,81,45,.10); --teal-soft:#c2410c;
    --amber:#C9A227; --amber-bg:rgba(201,162,39,.12);
    --rust:#B0512D; --rust-bg:rgba(176,81,45,.10);
    --blue:#8a6f4a; --blue-bg:rgba(138,111,74,.10);
    --hl:#B0512D;
    --topbar-bg:rgba(250,246,239,.92);
    --tip-bg:#2E1F1A; --tip-ink:#FAF6EF;
  }
  html[data-theme="sakyo"]{
    --bg:#FAF8F5; --bg2:#FCFBF9; --panel:#FCFBF9; --panel2:#F2EEE8;
    --line:#E6E0D7; --line2:#D5CCBF;
    --ink:#2B2D33; --muted:#6e6a63; --muted2:#9b958b;
    --teal:#0F8B8D; --teal-bg:rgba(15,139,141,.10); --teal-soft:#13a0a2;
    --amber:#B8860B; --amber-bg:rgba(184,134,11,.12);
    --rust:#0F8B8D; --rust-bg:rgba(15,139,141,.10);
    --blue:#5a7d80; --blue-bg:rgba(90,125,128,.10);
    --hl:#0F8B8D;
    --topbar-bg:rgba(250,248,245,.92);
    --tip-bg:#2B2D33; --tip-ink:#FAF8F5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  .mono{font-family:var(--mono)}

  .topbar{position:sticky;top:0;z-index:60;background:var(--topbar-bg);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar-in{max-width:1080px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .brandlogo{height:30px;width:auto;display:block;opacity:.95}
  .brand .nm{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .hotelfilter{display:flex;gap:6px;margin-left:auto;background:var(--panel);border:1px solid var(--line2);border-radius:30px;padding:4px}
  .hbtn{appearance:none;cursor:pointer;border:none;background:none;border-radius:24px;padding:8px 18px;font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--muted);transition:.15s;display:flex;align-items:center;gap:8px}
    .hbtn.on{background:var(--teal);color:var(--bg2);font-weight:600}
  .hbtn:not(.on):hover{color:var(--ink)}

  .layout{display:flex;gap:0;align-items:flex-start;max-width:1340px;margin:0 auto}
  .sidebar{position:sticky;top:62px;align-self:flex-start;flex:0 0 210px;padding:24px 14px 24px 20px;max-height:calc(100vh - 62px);overflow-y:auto}
  .sb-title{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2);padding:0 12px;margin-bottom:12px}
  .sb-nav{display:flex;flex-direction:column;gap:2px}
  .sb-link{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;transition:.15s;border-left:2px solid transparent;line-height:1.3}
  .sb-link .sb-n{flex-shrink:0;width:22px;height:22px;border-radius:6px;background:var(--panel);border:1px solid var(--line2);display:grid;place-items:center;font-family:var(--mono);font-size:11px;color:var(--muted2);transition:.15s}
  .sb-link:hover{color:var(--ink);background:var(--panel)}
  .sb-link.on{color:var(--teal);background:var(--teal-bg);border-left-color:var(--teal)}
  .sb-link.on .sb-n{background:var(--teal);color:var(--bg2);border-color:var(--teal)}
  .deck{flex:1;min-width:0;max-width:1080px;margin:0 auto;padding:24px 20px 80px}
  /* room types slide */
  .rttable{display:flex;flex-direction:column;gap:9px}
  .rtrow{display:grid;grid-template-columns:26px 1fr 150px;gap:14px;align-items:center}
  .rtrank{width:26px;height:26px;border-radius:7px;background:var(--panel);border:1px solid var(--line2);display:grid;place-items:center;font-family:var(--mono);font-size:12px;color:var(--muted2)}
  .rtname{font-size:13.5px;color:var(--ink);margin-bottom:5px}
  .rtinfo{font-family:var(--mono);font-size:10.5px;color:var(--muted2)}
  .rtbarwrap{height:14px;background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .rtbar{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-soft,#6cc7b6));border-radius:3px}
  .rtnums{text-align:right;font-family:var(--mono);line-height:1.4}
  .rtpct{display:block;font-size:14px;color:var(--teal);font-weight:600}
  .rtadr{display:block;font-size:10.5px;color:var(--muted)}
  .natgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .natcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px}
  .nathead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
  .natname{font-family:var(--disp);font-size:17px;font-weight:600}
  .natrn{font-family:var(--mono);font-size:11px;color:var(--muted2)}
  .nattops{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
  .ntop{display:grid;grid-template-columns:1fr 70px 34px;gap:9px;align-items:center}
  .ntname{font-size:12px;color:var(--muted)}
  .ntop.first .ntname{color:var(--ink);font-weight:600}
  .ntbar{height:8px;background:var(--line);border-radius:4px;overflow:hidden}
  .ntbar span{display:block;height:100%;background:var(--rust);opacity:.6}
  .ntop.first .ntbar span{background:var(--teal);opacity:1}
  .ntpct{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-align:right}
  .natreason{font-size:12.5px;color:var(--muted);line-height:1.55;border-top:1px solid var(--line);padding-top:10px}
  @media(max-width:980px){.natgrid{grid-template-columns:1fr}.rtrow{grid-template-columns:24px 1fr 110px}}
  /* conclusion targets 5-card grid */
  .targetgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .targetgrid .card{padding:16px 16px}
  .targetgrid .stat{font-size:22px}
  .targetgrid h3{font-size:14px}
  @media(max-width:980px){.targetgrid{grid-template-columns:repeat(2,1fr)}}
  /* finance strategy stacked */
  .stratstack{display:flex;flex-direction:column;gap:14px}
  /* finance composition */
  .comptable{display:flex;flex-direction:column;gap:10px}
  .comprow{display:grid;grid-template-columns:200px 1fr 130px;gap:14px;align-items:center}
  .compk{font-size:13px;color:var(--ink)}
  .compbarwrap{height:22px;background:var(--panel);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .compbar{height:100%;border-radius:4px}
  .compbar.teal{background:var(--teal)}.compbar.rust{background:var(--rust)}.compbar.amber{background:var(--amber)}.compbar.blue{background:var(--blue)}.compbar.muted{background:var(--muted2)}
  .compv{font-family:var(--mono);font-size:11.5px;color:var(--muted);text-align:right}
  @media(max-width:980px){
    .sidebar{display:none}
    .layout{display:block}
    .comprow{grid-template-columns:1fr;gap:4px}
    .compv{text-align:left}
  }
  .deck-orig-placeholder{}
  .slide{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:40px 44px;margin-bottom:22px;position:relative;overflow:hidden;animation:fade .3s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .slide::before{content:attr(data-no);position:absolute;top:22px;right:30px;font-family:var(--mono);font-size:11px;color:var(--muted2);letter-spacing:.12em}

  .chapter{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);margin-bottom:14px}
  .chapter .step{width:22px;height:22px;border-radius:50%;border:1px solid var(--teal);color:var(--teal);display:grid;place-items:center;font-size:11px;font-weight:600}
  .chapter .arc{color:var(--teal)}

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--teal)}
  h1{font-family:var(--disp);font-weight:500;font-size:clamp(28px,5vw,50px);line-height:1.08;letter-spacing:-.01em}
  h2{font-family:var(--disp);font-weight:500;font-size:clamp(22px,3.2vw,30px);line-height:1.18;margin:8px 0 4px;letter-spacing:-.01em}
  h3{font-family:var(--disp);font-weight:500;font-size:18px;margin-bottom:4px}
  .lead{color:var(--muted);font-size:15.5px;max-width:80ch;margin-top:10px}
  .lead b{color:var(--ink);font-weight:600}
  .hl{color:var(--hl)}
  .divider{height:1px;background:var(--line);margin:24px 0}
  .sect-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);margin:22px 0 12px}

  .cover{background:linear-gradient(160deg,var(--panel2) 0%,var(--bg2) 70%);border-color:var(--line2);padding:60px 48px}
  .cover .meta{display:flex;gap:26px;flex-wrap:wrap;margin-top:28px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .cover .meta div span{display:block;color:var(--muted2);font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
  .cover .meta div b{color:var(--ink);font-weight:500}
  .roadmap{display:flex;gap:0;margin-top:30px;flex-wrap:wrap}
  .rm{display:flex;align-items:center;gap:10px;padding:0 18px 0 0;position:relative}
  .rm .n{width:26px;height:26px;border-radius:50%;background:var(--panel);border:1px solid var(--teal);color:var(--teal);display:grid;place-items:center;font-family:var(--mono);font-size:11px;flex-shrink:0}
  .rm .lb{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .rm:not(:last-child)::after{content:"→";color:var(--muted2);margin-left:8px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:8px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 16px}
  .kpi .v{font-family:var(--disp);font-size:28px;font-weight:600;line-height:1}
  .kpi .v.teal{color:var(--teal)}.kpi .v.amber{color:var(--amber)}.kpi .v.rust{color:var(--rust)}.kpi .v.blue{color:var(--blue)}
  .kpi .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-top:9px}
  .kpi .d{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.45}

  .insight{display:flex;gap:14px;background:var(--teal-bg);border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:8px;padding:16px 18px;margin:18px 0}
  .insight .tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);flex-shrink:0;padding-top:2px;white-space:nowrap}
  .insight p{font-size:14px;color:var(--ink);line-height:1.55}
  .insight.amber{background:var(--amber-bg);border-color:var(--line);border-left-color:var(--amber)}.insight.amber .tag{color:var(--amber)}
  .insight.rust{background:var(--rust-bg);border-color:var(--line);border-left-color:var(--rust)}.insight.rust .tag{color:var(--rust)}

  .tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
  .tbl th{font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line2)}
  .tbl th.r,.tbl td.r{text-align:right;font-family:var(--mono)}
  .tbl td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tr.hot td{background:var(--teal-bg)}
  .tbl .pos{color:var(--teal)}.tbl .neg{color:var(--rust)}.tbl .warn{color:var(--amber)}
  .tag-pill{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:11px;white-space:nowrap}
  .tag-pill.t1{background:var(--teal-bg);color:var(--teal)}
  .tag-pill.t2{background:var(--amber-bg);color:var(--amber)}
  .tag-pill.t3{background:var(--rust-bg);color:var(--rust)}
  .tag-pill.t4{background:var(--blue-bg);color:var(--blue)}

  .trend{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:12px}
  .tcell{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px 8px;text-align:center}
  .tcell .m{font-family:var(--mono);font-size:10px;color:var(--muted2)}
  .tcell .pct{font-family:var(--disp);font-size:20px;font-weight:600;color:var(--teal);margin-top:4px}
  .tcell .pct.lo{color:var(--muted)}

  .chart{margin-top:14px}
  .bars{display:flex;align-items:flex-end;gap:10px;height:190px;border-bottom:1px solid var(--line2);padding-top:22px}
  .bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;position:relative}
  .bcol .stack{display:flex;align-items:flex-end;gap:3px;width:100%;justify-content:center;height:100%}
  .bcol .bar{width:15px;border-radius:3px 3px 0 0}
  .bcol .b-26{background:var(--teal)}
  .bcol .b-25{background:var(--muted2);opacity:.55}
  .bcol .lab{font-family:var(--mono);font-size:10px;color:var(--muted2)}
  .legend{display:flex;gap:18px;margin-top:12px;font-family:var(--mono);font-size:10.5px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:7px}
  .legend .sw{width:12px;height:12px;border-radius:3px}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px}
  .card.hot{border-color:var(--teal);box-shadow:inset 3px 0 0 var(--teal)}
  .card.watch{box-shadow:inset 3px 0 0 var(--amber)}
  .card.risk{box-shadow:inset 3px 0 0 var(--rust)}
  .card p{font-size:13px;color:var(--muted);line-height:1.55;margin-top:6px}
  .card p b{color:var(--ink)}
  .card .stat{font-family:var(--disp);font-size:25px;font-weight:600;line-height:1}
  .card .stat.teal{color:var(--teal)}.card .stat.amber{color:var(--amber)}.card .stat.rust{color:var(--rust)}.card .stat.blue{color:var(--blue)}

  .acts{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .act{background:var(--panel);padding:15px 18px;display:grid;grid-template-columns:30px 1fr 150px;gap:14px;align-items:start}
  .act .n{font-family:var(--mono);color:var(--teal);font-size:12px;padding-top:2px}
  .act .t b{font-size:14px}
  .act .t small{display:block;color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.5}
  .act .k{font-family:var(--mono);font-size:10.5px;color:var(--amber);text-align:right;line-height:1.5}

  .phasebar{display:flex;gap:8px;margin:16px 0 18px;flex-wrap:wrap}
  .ptab{appearance:none;cursor:pointer;background:var(--panel);border:1px solid var(--line2);border-radius:24px;padding:9px 16px;font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;transition:.15s}
  .ptab .dot{width:8px;height:8px;border-radius:2px;transform:rotate(45deg)}
  .ptab[data-p="now"] .dot{background:var(--rust)}
  .ptab[data-p="q3"] .dot{background:var(--amber)}
  .ptab[data-p="q4"] .dot{background:var(--teal)}
  .ptab.on{color:var(--ink);border-color:var(--ink);background:var(--panel2)}
  .pblock{display:none}.pblock.on{display:block;animation:fade .25s ease both}

  /* strategy summary box */
  .sumbox{margin-top:22px;background:var(--teal-bg);border:1px solid var(--teal);border-radius:12px;padding:22px 24px}
  .sumtag{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:14px}
  .sumlist{list-style:none;display:flex;flex-direction:column;gap:11px}
  .sumlist li{position:relative;padding-left:24px;font-size:14px;line-height:1.55;color:var(--ink)}
  .sumlist li::before{content:"";position:absolute;left:4px;top:8px;width:8px;height:8px;border-radius:2px;transform:rotate(45deg);background:var(--teal)}
  /* market comparison table */
  .cmptbl td{font-size:12.5px}
  .cmptbl td:nth-child(2),.cmptbl td:nth-child(3){color:var(--muted)}
  /* monthly playbook */
  .pbtable{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .pbhead{display:grid;grid-template-columns:62px 1fr 150px;gap:14px;padding:11px 18px;background:var(--panel2);font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2)}
  .pbrow{display:grid;grid-template-columns:62px 1fr 150px;gap:14px;padding:15px 18px;background:var(--panel);align-items:start}
  .pbm{font-family:var(--disp);font-size:24px;font-weight:600;color:var(--teal);line-height:1}
  .pbfocus{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--ink);font-weight:600;margin-bottom:5px}
  .pbwhy{font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:6px}
  .pbact{font-size:13px;color:var(--ink);line-height:1.5}
  .pbkpi{font-family:var(--mono);font-size:10.5px;color:var(--amber);text-align:right;line-height:1.5;align-self:center}
  @media(max-width:820px){
    .pbhead{display:none}
    .pbrow{grid-template-columns:48px 1fr;gap:12px}
    .pbkpi{grid-column:2;text-align:left;margin-top:4px}
  }
  /* market share strip */
  .mshrow{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:4px}
  .msh{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 6px;text-align:center}
  .mshm{font-family:var(--mono);font-size:10px;color:var(--muted2)}
  .mshv{font-family:var(--disp);font-size:18px;font-weight:600;color:var(--teal);margin-top:3px}
  .mshv.lo{color:var(--muted)}
  /* channel comparison */
  .chcompare{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch;margin-top:4px}
  .chpanel{border-radius:12px;padding:20px;border:1px solid var(--line)}
  .chpanel.web{background:var(--teal-bg);border-color:var(--line)}
  .chpanel.ota{background:var(--rust-bg);border-color:var(--line)}
  .chhead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .chname{font-family:var(--disp);font-size:21px;font-weight:600}
  .chpanel.web .chname{color:var(--teal)}
  .chpanel.ota .chname{color:var(--rust)}
  .chrole{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2)}

    .chvs{min-width:0}

  .foot b{color:var(--muted)}
  .src{font-family:var(--mono);font-size:10.5px;color:var(--muted2);margin-top:14px;line-height:1.6}

    .kpis,.cols,.cols3{grid-template-columns:1fr}
    .kpis{grid-template-columns:1fr 1fr}

function marketHTML(d){
  const s=d.market; const TH=THEME[CUR];
  const M=s.months;
  // SVG combo chart: OTA bars (left axis) + Web direct line (right axis)
  const W=900, H=300, padL=54, padR=54, padT=24, padB=40;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const n=M.length, step=plotW/n;
  const otaMax=Math.ceil(Math.max(...M.map(m=>m.ota))/200)*200;
  const webMax=Math.ceil(Math.max(...M.map(m=>m.web))/100)*100;
  const x=i=>padL+step*i+step/2;
  const yO=v=>padT+plotH-(v/otaMax)*plotH;
  const yW=v=>padT+plotH-(v/webMax)*plotH;
  const barW=Math.min(46,step*0.5);
  // gridlines (left axis)
  let grid="";
  for(let g=0;g<=4;g++){
    const val=otaMax*g/4, gy=yO(val);
    grid+=`<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="${TH.line}" stroke-width="1"/>`+
          `<text x="${padL-8}" y="${gy+3}" text-anchor="end" font-family="var(--mono)" font-size="9" fill="${TH.muted}">${val}</text>`;
  }
  // right axis labels (web)
  let raxis="";
  for(let g=0;g<=4;g++){
    const val=webMax*g/4, gy=yW(val);
    raxis+=`<text x="${W-padR+8}" y="${gy+3}" text-anchor="start" font-family="var(--mono)" font-size="9" fill="${TH.accent}">${val}</text>`;
  }
  // OTA bars
  let bars="";
  M.forEach((m,i)=>{
    const bx=x(i)-barW/2, by=yO(m.ota), bh=padT+plotH-by;
    bars+=`<g class="mg"><rect x="${bx}" y="${by}" width="${barW}" height="${bh}" rx="4" fill="${TH.ota}" opacity="0.65"/>`+
      `<rect x="${bx-step/2+barW/2}" y="${padT}" width="${step}" height="${plotH}" fill="transparent"><title>T${i+7} · OTA ${m.ota} RN (ADR ${m.oadr}) · Web ${m.web} RN (ADR ${m.wadr})</title></rect></g>`;
  });
  // Web line + area
  const linePts=M.map((m,i)=>`${x(i)},${yW(m.web)}`).join(" ");
  const areaPts=`${padL+step/2},${padT+plotH} ${linePts} ${padL+plotW-step/2},${padT+plotH}`;
  let dots="";
  M.forEach((m,i)=>{
    dots+=`<circle cx="${x(i)}" cy="${yW(m.web)}" r="4.5" fill="${TH.accent}" stroke="${TH.bg}" stroke-width="2"/>`+
      `<text x="${x(i)}" y="${yW(m.web)-12}" text-anchor="middle" font-family="var(--mono)" font-size="9.5" fill="${TH.accent}" font-weight="600">${m.web}</text>`;
  });
  // x labels
  let xlab="";
  M.forEach((m,i)=>{ xlab+=`<text x="${x(i)}" y="${H-padB+20}" text-anchor="middle" font-family="var(--mono)" font-size="10" fill="${TH.muted}">${m.m}</text>`; });
  const svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img">
    ${grid}${raxis}${bars}
    <polygon points="${areaPts}" fill="${TH.accent}" opacity="0.10"/>
    <polyline points="${linePts}" fill="none" stroke="${TH.accent}" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${xlab}
    <text x="${padL-8}" y="${padT-9}" text-anchor="end" font-family="var(--mono)" font-size="8.5" fill="${TH.muted}">OTA RN</text>
    <text x="${W-padR+8}" y="${padT-9}" text-anchor="start" font-family="var(--mono)" font-size="8.5" fill="${TH.accent}">Web RN</text>
  </svg>`;
  const reads=s.reads.map(r=>`<div class="card"><h4>${r.h}</h4><p>${r.p}</p></div>`).join("");
  const mktRows=s.markets.map(o=>`<tr><td>${o.mk}</td><td class="r">${o.rn}</td><td class="r">${o.pct}</td><td class="r">${o.adr}</td><td class="r">${o.lead}</td><td><span class="tag-pill ${o.pill}">${o.pl}</span></td></tr>`).join("");
  const cmp=s.compare;
  const cmpRows=cmp.rows.map(o=>`<tr><td>${o.mk}</td><td>${o.total}</td><td>${o.ota}</td><td><span class="tag-pill ${o.cls}">${o.skew}</span></td></tr>`).join("");
  const cmpReads=cmp.reads.map(r=>`<div class="card"><h4>${r.h}</h4><p>${r.p}</p></div>`).join("");
  const pb=s.playbook.map(p=>`<div class="pbrow"><div class="pbm">${p.m}</div><div class="pbbody"><div class="pbfocus">${p.focus}</div><div class="pbwhy">${p.why}</div><div class="pbact">${p.act}</div></div><div class="pbkpi">${p.kpi}</div></div>`).join("");
  return `<section class="slide" id="sec-market" data-no="03">
    <div class="chapter"><span class="step">2</span> <span class="arc">Bức tranh thị trường</span> <span>· nửa cuối 2025</span></div>
    <h2>Khối lượng Web và OTA theo tháng, mùa cao điểm cuối năm</h2>
    <p class="lead">Nửa cuối 2025 là giai đoạn gần nhất có đủ dữ liệu cả hai kênh theo từng tháng và cùng mùa với 2H/2026 sắp tới. OTA là cột (trục trái), Web direct là đường (trục phải) để dễ so sánh đà tăng dù hai kênh chênh nhau nhiều về khối lượng. Di chuột vào từng tháng để xem ADR.</p>
    <div class="chart">${svg}
      <div class="legend"><span><span class="sw" style="background:var(--rust);opacity:.65"></span> OTA (cột, trục trái)</span><span><span class="sw" style="background:var(--teal)"></span> Web direct (đường, trục phải)</span><span style="color:var(--muted2)">Di chuột để xem ADR</span></div></div>
    <div class="sect-label">${s.marketsTitle}</div>
    <table class="tbl"><thead><tr><th>Thị trường</th><th class="r">OTA RN</th><th class="r">% OTA</th><th class="r">ADR</th><th class="r">Lead TB</th><th>Hành vi đặt</th></tr></thead><tbody>${mktRows}</tbody></table>
    <div class="insight"><div class="tag">Thị trường</div><p>${s.marketRead}</p></div>
    <div class="sect-label">${cmp.title}</div>
    <p class="lead" style="margin-bottom:12px">${cmp.note}</p>
    <table class="tbl cmptbl"><thead><tr><th>Thị trường</th><th>Tổng booking / direct</th><th>Trên OTA</th><th>Nghiêng kênh</th></tr></thead><tbody>${cmpRows}</tbody></table>
    <div class="cols3" style="margin-top:18px">${cmpReads}</div>
    <div class="insight teal-strong"><div class="tag">Insight</div><p>${cmp.insight}</p></div>
    <div class="sect-label">Đọc bức tranh thị trường</div>
    <div class="cols3">${reads}</div>
    <div class="insight teal-strong"><div class="tag">Insight</div><p>${s.strategy}</p></div>
    <div class="sect-label">Kế hoạch chạy Web direct theo từng tháng (T7–T12)</div>
    <p class="lead" style="margin-bottom:14px">${s.playbookNote}</p>
    <div class="pbtable">
      <div class="pbhead"><div>Tháng</div><div>Thị trường · vì sao · việc cần làm</div><div>KPI</div></div>
      ${pb}
    </div>
  </section>`;
}

      <button class="ptab" data-p="q4"><span class="dot"></span> Quý 4 · T10–T12</button>
    </div>
    <div class="pblock on" data-p="now"><div class="acts">${block('now')}</div></div>
    <div class="pblock" data-p="q3"><div class="acts">${block('q3')}</div></div>
    <div class="pblock" data-p="q4"><div class="acts">${block('q4')}</div></div>
  </section>`;
}
function closeHTML(d){
  const t=d.targets.map(x=>`<div class="card hot"><div class="stat teal">${x.stat}</div><h3>${x.h}</h3><p>${x.p}</p></div>`).join("");
  const sumLi=d.market.summary.map(x=>`<li>${x}</li>`).join("");
  return `<section class="slide" id="sec-close" data-no="08">
    <div class="chapter"><span class="step">5</span> <span class="arc">Kết luận</span> <span>· chiến lược & mục tiêu</span></div>
    <h2>Chiến lược triển khai 2H/2026 cho ${d.name}</h2>
    <p class="lead">Tóm lại: thực trạng cho thấy web đang giành thị phần khỏi OTA ở mức giá cao hơn; vấn đề là nhịp forward chậm và tập trung hạng phòng; giải pháp là kéo tệp OTA lead dài về direct theo từng tháng. Dưới đây là chiến lược chốt lại và mục tiêu theo dõi.</p>
    <div class="sumbox" style="margin-top:18px">
      <div class="sumtag">Chiến lược 2H/2026 sẽ triển khai</div>
      <ul class="sumlist">${sumLi}</ul>
    </div>
    <div class="sect-label">Mục tiêu định lượng để theo dõi</div>
    <div class="targetgrid">${t}</div>
    <div class="src"><b>Nguồn:</b> ${d.src} Toàn bộ phân tích chỉ dùng dữ liệu nội bộ được cung cấp.</div>
  </section>`;
}
function roomsHTML(d){
  const rt=d.roomtypes;
  const roomBars=rt.rooms.map((r,i)=>`<div class="rtrow"><div class="rtrank">${i+1}</div><div class="rtmain"><div class="rtname">${r.name} <span class="rtinfo">${r.info}</span></div><div class="rtbarwrap"><div class="rtbar" style="width:${r.w}%"></div></div></div><div class="rtnums"><span class="rtpct">${String(r.pct).replace('.',',')}%</span><span class="rtadr">ADR ${r.adr}</span></div></div>`).join("");
  const natCards=rt.nats.map(n=>{
    const tops=n.top.map((t,idx)=>`<div class="ntop ${idx===0?'first':''}"><span class="ntname">${t.r}</span><span class="ntbar"><span style="width:${t.pct}%"></span></span><span class="ntpct">${t.pct}%</span></div>`).join("");
    return `<div class="natcard"><div class="nathead"><span class="natname">${n.nat}</span><span class="natrn">${n.rn} RN</span></div><div class="nattops">${tops}</div><p class="natreason">${n.reason}</p></div>`;
  }).join("");
  const ins=rt.insights.map(i=>`<div class="card"><h4>${i.h}</h4><p>${i.p}</p></div>`).join("");
  return `<section class="slide" id="sec-rooms" data-no="04">
    <div class="chapter"><span class="step">R</span> <span class="arc">Hạng phòng & thị trường</span> <span>· booking confirmed</span></div>
    <h2>Phân tích theo hạng phòng và hành vi đặt phòng theo thị trường · ${d.name}</h2>
    <p class="lead">${rt.intro}</p>
    <div class="sect-label">Xếp hạng hạng phòng theo khối lượng · ${rt.total}</div>
    <div class="rttable">${roomBars}</div>
    <div class="sect-label">Thị trường nào đặt loại phòng nào (top 3 hạng phòng theo từng thị trường)</div>
    <div class="natgrid">${natCards}</div>
    <div class="sect-label">Insight đặt phòng theo thị trường</div>
    <div class="cols3">${ins}</div>
  </section>`;
}
function financeHTML(d){
  const f=d.finance; const TH=THEME[CUR];
  const kpis=f.kpis.map(k=>`<div class="kpi"><div class="v teal">${k.v}</div><div class="l">${k.l}</div><div class="d">${k.d}</div></div>`).join("");
  // combo chart: revenue bars (left) + ratio line (right)
  const W=900,H=300,padL=58,padR=52,padT=24,padB=40;
  const plotW=W-padL-padR, plotH=H-padT-padB, n=f.months.length, step=plotW/n;
  const revMax=f.revMax, ratMax=Math.ceil(Math.max(...f.ratio)/10)*10;
  const x=i=>padL+step*i+step/2;
  const yR=v=>padT+plotH-(v/revMax)*plotH;
  const yT=v=>padT+plotH-(v/ratMax)*plotH;
  const barW=Math.min(48,step*0.5);
  let grid="";
  for(let g=0;g<=4;g++){const val=revMax*g/4,gy=yR(val);
    grid+=`<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="${TH.line}" stroke-width="1"/>`+
    `<text x="${padL-8}" y="${gy+3}" text-anchor="end" font-family="monospace" font-size="9" fill="${TH.muted}">${val}</text>`;}
  let raxis="";
  for(let g=0;g<=4;g++){const val=ratMax*g/4,gy=yT(val);
    raxis+=`<text x="${W-padR+8}" y="${gy+3}" text-anchor="start" font-family="monospace" font-size="9" fill="${TH.amber}">${val}%</text>`;}
  let bars="";
  f.rev.forEach((v,i)=>{const bx=x(i)-barW/2,by=yR(v),bh=padT+plotH-by;
    bars+=`<g><rect x="${bx}" y="${by}" width="${barW}" height="${bh}" rx="4" fill="${TH.accent}" opacity="0.55"/>`+
    `<text x="${x(i)}" y="${by-7}" text-anchor="middle" font-family="monospace" font-size="9.5" fill="${TH.text}">${v}</text>`+
    `<rect x="${x(i)-step/2}" y="${padT}" width="${step}" height="${plotH}" fill="transparent"><title>${f.months[i]} · Doanh thu ${v}tr · CP MKT ${f.cost[i]}tr · tỷ lệ ${String(f.ratio[i]).replace('.',',')}%</title></rect></g>`;});
  const linePts=f.ratio.map((v,i)=>`${x(i)},${yT(v)}`).join(" ");
  let dots="";
  f.ratio.forEach((v,i)=>{
    const dy=yT(v), by=yR(f.rev[i]);
    const labelY = (dy < by + 18 && dy > by - 26) ? dy+18 : dy-11;
    dots+=`<circle cx="${x(i)}" cy="${dy}" r="4.5" fill="${TH.amber}" stroke="${TH.bg}" stroke-width="2"/>`+
    `<text x="${x(i)}" y="${labelY}" text-anchor="middle" font-family="monospace" font-size="9.5" fill="${TH.amber}" font-weight="600">${String(v).replace('.',',')}%</text>`;});
  let xlab="";f.months.forEach((m,i)=>{xlab+=`<text x="${x(i)}" y="${H-padB+20}" text-anchor="middle" font-family="monospace" font-size="10" fill="${TH.muted}">${m}</text>`;});
  const svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img">
    ${grid}${raxis}${bars}
    <polyline points="${linePts}" fill="none" stroke="${TH.amber}" stroke-width="2.5" stroke-linejoin="round"/>${dots}${xlab}
    <text x="${padL-8}" y="${padT-9}" text-anchor="end" font-family="monospace" font-size="8.5" fill="${TH.muted}">Doanh thu (tr)</text>
    <text x="${W-padR+8}" y="${padT-9}" text-anchor="start" font-family="monospace" font-size="8.5" fill="${TH.amber}">CP/DT (%)</text>
  </svg>`;
  const compMax=Math.max(...f.composition.map(c=>c.v));
  const comp=f.composition.map(c=>`<div class="comprow"><div class="compk">${c.k}</div><div class="compbarwrap"><div class="compbar ${c.cls}" style="width:${c.v/compMax*100}%"></div></div><div class="compv">${c.v} tr · ${c.pct}</div></div>`).join("");
  const ins=f.insights.map(i=>`<div class="card"><h4>${i.h}</h4><p>${i.p}</p></div>`).join("");
  return `<section class="slide" id="sec-finance" data-no="06">
    <div class="chapter"><span class="step">$</span> <span class="arc">Chi phí & Doanh thu</span> <span>· thực tế T1–T5/2026</span></div>
    <h2>Chi phí Marketing gắn với doanh thu phòng · ${d.name}</h2>
    <p class="lead">${f.intro}</p>
    <div class="kpis" style="margin-top:18px">${kpis}</div>
    <div class="sect-label">Doanh thu phòng và tỷ lệ chi phí MKT theo tháng</div>
    <div class="chart">${svg}
      <div class="legend"><span><span class="sw" style="background:var(--teal);opacity:.55"></span> Doanh thu phòng (cột, trục trái)</span><span><span class="sw" style="background:var(--amber)"></span> Tỷ lệ CP MKT / DT (đường, trục phải)</span><span style="color:var(--muted2)">Di chuột để xem chi tiết</span></div></div>
    <div class="insight amber"><div class="tag">Đọc số</div><p>${f.ratioNote}</p></div>
    <div class="sect-label">Cơ cấu chi phí Marketing T1–T5/2026</div>
    <div class="comptable">${comp}</div>
    <div class="sect-label">${f.strategyTitle}</div>
    <div class="stratstack">${f.strategy.map(x=>`<div class="card watch"><h3>${x.h}</h3><p>${x.p}</p></div>`).join("")}</div>
    <div class="sect-label">Nhận định chi phí</div>
    <div class="cols3">${ins}</div>
  </section>`;
}
function render(){
  const d=DATA[CUR];
  document.documentElement.setAttribute("data-theme", CUR);
  document.getElementById("brandLogo").src=d.logo;
  document.getElementById("deck").innerHTML = coverHTML(d)+stateHTML(d)+marketHTML(d)+roomsHTML(d)+financeHTML(d)+solutionHTML(d)+closeHTML(d)
    + `<div class="foot">Silverland Hospitality · ${d.name} · Báo cáo phân tích kênh Web Direct 2H/2026 · Lập trên dữ liệu booking và chi phí nội bộ.</div>`;
  bindPhase();
  setupScrollSpy();
}
function setupScrollSpy(){
  const links=[...document.querySelectorAll(".sb-link")];
  const secs=links.map(l=>document.getElementById(l.dataset.sec)).filter(Boolean);
  if(!secs.length) return;
  const spy=()=>{
    const y=window.scrollY+120;
    let cur=secs[0].id;
    for(const s of secs){ if(s.offsetTop<=y) cur=s.id; }
    links.forEach(l=>l.classList.toggle("on",l.dataset.sec===cur));
  };
  // detach old listener if any, attach fresh
  window.onscroll=spy; spy();
}
function bindSidebar(){
  document.querySelectorAll(".sb-link").forEach(l=>l.addEventListener("click",()=>{
    const el=document.getElementById(l.dataset.sec);
    if(el){ const top=el.getBoundingClientRect().top+window.scrollY-72; window.scrollTo({top,behavior:"smooth"}); }
  }));
}
function bindPhase(){
  document.querySelectorAll(".ptab").forEach(t=>t.addEventListener("click",()=>{
    const p=t.dataset.p, sld=t.closest(".slide");
    sld.querySelectorAll(".ptab").forEach(x=>x.classList.toggle("on",x===t));
    sld.querySelectorAll(".pblock").forEach(b=>b.classList.toggle("on",b.dataset.p===p));
  }));
}
document.querySelectorAll(".hbtn").forEach(b=>b.addEventListener("click",()=>{
  CUR=b.dataset.h;
  document.querySelectorAll(".hbtn").forEach(x=>x.classList.toggle("on",x===b));
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}));
bindSidebar();
render();
</script>
</body>
</html>
